
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Bookings</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f7f6; color: #333; }
        h1 { color: #003366; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; box-shadow: 0 2px 15px rgba(0,0,0,0.1); background-color: white;}
        th, td { border: 1px solid #ddd; padding: 12px 15px; text-align: left; }
        th { background-color: #003366; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        tr:hover { background-color: #f1f1f1; }
        .status-select { padding: 8px; border-radius: 4px; border: 1px solid #ccc; }
        .status-pending { font-weight: bold; color: #f39c12; }
        .status-confirmed { font-weight: bold; color: #3498db; }
        .status-completed { font-weight: bold; color: #2ecc71; }
        .status-cancelled { font-weight: bold; color: #e74c3c; }
        .container { max-width: 1200px; margin: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Admin Dashboard: All Bookings</h1>
        <table id="bookings-table">
            <thead>
                <tr>
                    <th>Submitted At</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Service</th>
                    <th>Address</th>
                    <th>Status</th>
                    <th>Update Status</th>
                </tr>
            </thead>
            <tbody id="bookings-body">
                <!-- Bookings will be inserted here by JavaScript -->
            </tbody>
        </table>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', fetchBookings);

        async function fetchBookings() {
            try {
                const response = await fetch('/api/bookings');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const data = await response.json();
                const bookingsBody = document.getElementById('bookings-body');
                bookingsBody.innerHTML = ''; // Clear existing rows

                if (data.success && data.bookings.length > 0) {
                    data.bookings.forEach(booking => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${new Date(booking.submittedAt).toLocaleString()}</td>
                            <td>${booking.name}</td>
                            <td>${booking.email}</td>
                            <td>${booking.phone}</td>
                            <td>${booking.service}</td>
                            <td>${booking.address || ''}, ${booking.city || ''}, ${booking.state || ''} ${booking.zipCode || ''}</td>
                            <td><span class="status-${booking.status.toLowerCase()}">${booking.status}</span></td>
                            <td>
                                <select class="status-select" data-id="${booking._id}" onchange="updateStatus(this)">
                                    <option value="pending" ${booking.status.toLowerCase() === 'pending' ? 'selected' : ''}>Pending</option>
                                    <option value="confirmed" ${booking.status.toLowerCase() === 'confirmed' ? 'selected' : ''}>Confirmed</option>
                                    <option value="completed" ${booking.status.toLowerCase() === 'completed' ? 'selected' : ''}>Completed</option>
                                    <option value="cancelled" ${booking.status.toLowerCase() === 'cancelled' ? 'selected' : ''}>Cancelled</option>
                                </select>
                            </td>
                        `;
                        bookingsBody.appendChild(row);
                    });
                } else {
                    bookingsBody.innerHTML = `<tr><td colspan="8" style="text-align:center;">${data.message || 'No bookings found.'}</td></tr>`;
                }
            } catch (error) {
                console.error('Error fetching bookings:', error);
                const bookingsBody = document.getElementById('bookings-body');
                bookingsBody.innerHTML = '<tr><td colspan="8" style="text-align:center;">Failed to load bookings. Check the API.</td></tr>';
            }
        }

        async function updateStatus(selectElement) {
            const bookingId = selectElement.dataset.id;
            const newStatus = selectElement.value;

            if (!confirm(`Are you sure you want to change the status to "${newStatus}"?`)) {
                fetchBookings(); // Reset dropdown if cancelled
                return;
            }

            try {
                const response = await fetch(`/api/bookings/${bookingId}/status`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ status: newStatus })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.message || `HTTP error! status: ${response.status}`);
                }
                
                alert('Status updated successfully!');
                fetchBookings(); // Refresh the list to show the updated status
            } catch (error) {
                console.error('Error updating status:', error);
                alert(`Failed to update status: ${error.message}`);
            }
        }
    </script>
</body>
</html>
